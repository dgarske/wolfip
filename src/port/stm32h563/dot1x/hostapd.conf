# hostapd configuration for the wired IEEE 802.1X EAP-TLS demo.
#
# This makes a Linux host act as the 802.1X authenticator (+ integrated EAP
# server) over a WIRED Ethernet link to the STM32H563 running the wolfIP
# wolfSupplicant EAP-TLS demo (ENABLE_DOT1X=1).
#
# Run from this directory (src/port/stm32h563/dot1x/):
#   sudo hostapd -dd ./hostapd.conf
#
# Edit `interface` to the NIC wired to the H563. Certs in host/ are produced
# by ./gen_certs.sh and share the CA embedded in the firmware (dot1x_certs.h).

# Dedicated NIC directly cabled to the STM32H563 (point-to-point).
interface=enp6s0
driver=wired

# 802.1X authenticator
ieee8021x=1
eapol_version=2
# Reply to the supplicant's unicast MAC (learned from its EAPOL-Start),
# not the PAE group multicast. The PAE group (01:80:C2:00:00:03) is
# link-local and dropped by 802.1D switches; unicast traverses a switch
# and is also fine point-to-point.
use_pae_group_addr=0
eap_reauth_period=0

# Integrated EAP server (no external RADIUS needed)
eap_server=1
eap_user_file=./hostapd.eap_user

# EC P-256 server credentials + CA (must match the firmware's CA)
ca_cert=./host/ca.pem
server_cert=./host/server.pem
private_key=./host/server.key

# Verbose logging so the EAP-TLS exchange and result are visible
logger_stdout=-1
logger_stdout_level=1
